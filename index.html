<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline of the American Revolution</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #fff; }
button:focus { outline: none; }
::-webkit-scrollbar { height: 6px; width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
@keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.chip { border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; border: none; transition: all 0.15s; }
.chip.active { background: #c53030; color: #fff; }
.chip.inactive { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
.chip-mobile { border-radius: 16px; padding: 6px 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; border: none; }
.chip-mobile.active { background: #c53030; color: #fff; }
.chip-mobile.inactive { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); }
.zbtn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #fff; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; }
.zbtn:hover { background: rgba(255,255,255,0.1); }
.edge-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 30; width: 40px; height: 72px; background: rgba(184,47,50,0.85); backdrop-filter: blur(8px); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.edge-arrow:hover { background: rgba(184,47,50,1); }
.edge-arrow.left { left: 0; border-radius: 0 8px 8px 0; box-shadow: 2px 0 16px rgba(0,0,0,0.4); }
.edge-arrow.right { right: 0; border-radius: 8px 0 0 8px; box-shadow: -2px 0 16px rgba(0,0,0,0.4); }
.mobile-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 24px; }
.mobile-dot { width: 10px; height: 10px; border-radius: 50%; background: #c53030; box-shadow: 0 0 8px rgba(197,48,48,0.5); flex-shrink: 0; margin-top: 4px; }
.mobile-line { flex: 1; width: 2px; background: rgba(255,255,255,0.1); margin-top: 4px; }
.mobile-card { background: #3d4a6b; border-radius: 10px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); transition: transform 0.2s; }
.mobile-card:active { transform: scale(0.98); }
.share-input { width: 100%; background: #fff; border: 2px solid #e2e2e2; border-radius: 6px; padding: 12px 14px; font-size: 14px; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.share-input:focus { outline: none; border-color: #c53030; }
.copy-btn { padding: 12px 24px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
.copy-btn:hover { background: #2a2a4e; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useMemo, useEffect, useCallback } = React;

const placeholderImg = (id, hue) => {
  const h = (id * 37 + hue) % 360;
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect width="400" height="300" fill="hsl(${h},25%,22%)"/><rect x="40" y="40" width="320" height="220" rx="8" fill="hsl(${h},30%,28%)" stroke="hsl(${h},20%,40%)" stroke-width="1"/><text x="200" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="hsl(${h},20%,60%)">Historical Image</text><text x="200" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="hsl(${h},15%,50%)">Event #${id}</text><line x1="60" y1="200" x2="340" y2="200" stroke="hsl(${h},20%,35%)" stroke-width="1"/><text x="200" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="hsl(${h},15%,45%)">Library of Congress</text></svg>`)}`;
};

const EVENTS = [
  { id:1, year:1754, month:1, label:"Jan 1754", type:"STORY", title:"\u201CJoin, or Die\u201D Published", description:"Benjamin Franklin publishes the famous \"Join, or Die\" political cartoon in The Pennsylvania Gazette, urging colonial unity against the French and Native American threats.", imageCaption:"The Pennsylvania Gazette, Page 2. Published May 9, 1754. | Credit: Library of Congress", sections:[
    { title:"The Power of a Single Image", content:"In an era before mass media, Benjamin Franklin understood the persuasive power of a simple visual. The \"Join, or Die\" cartoon depicted a snake severed into eight segments.\n\nThe cartoon appeared alongside an editorial arguing that the colonies needed to band together. It was reprinted in nearly every newspaper in the colonies within weeks." },
    { title:"Franklin's Political Gambit", content:"Franklin didn't create the cartoon on a whim. It was part of a calculated political campaign to build support for his Albany Plan of Union.\n\nThe plan called for a Grand Council of delegates chosen by the colonial assemblies." },
    { title:"Legacy and Reuse", content:"The \"Join, or Die\" image took on new life during the Stamp Act crisis of 1765. By 1774, it had become one of the most recognizable images in the colonies.\n\nPaul Revere adapted the design for the masthead of The Massachusetts Spy." }
  ]},
  { id:2, year:1754, month:3, label:"Mar 1754", type:"STORY", title:"Albany Congress Convenes", description:"Delegates from seven colonies gather in Albany, New York, to discuss a unified defense against the French.", sections:[
    { title:"The Iroquois Question", content:"The official purpose was to negotiate with the Iroquois Confederacy, whose alliance was critical to colonial defense." },
    { title:"Seven Colonies, Seven Agendas", content:"Twenty-four delegates from seven colonies attended. Each delegation arrived with its own priorities." },
    { title:"A Plan Rejected, A Seed Planted", content:"Every single colonial legislature rejected the Albany Plan. The assemblies feared losing their autonomy." }
  ]},
  { id:3, year:1754, month:5, label:"May 1754", type:"STORY", title:"Washington\u2019s First Battle", description:"A young George Washington leads a colonial militia into the Ohio Valley. The ensuing skirmish at Jumonville Glen sparks a global conflict.", sections:[
    { title:"A 22-Year-Old Commander", content:"George Washington was just 22 years old when sent into the Ohio Valley. He had no formal military training." },
    { title:"The Jumonville Affair", content:"On May 28, 1754, Washington surprised a French encampment. The French commander was killed along with nine of his men." },
    { title:"Global Consequences", content:"The skirmish ignited the French and Indian War, which expanded into the global Seven Years' War." }
  ]},
  { id:4, year:1754, month:6, label:"Jun 1754", type:"QUOTE", title:"Fort Necessity Built", quoteAuthor:"George Washington", description:"Washington hastily constructs Fort Necessity as a defensive position." },
  { id:5, year:1754, month:7, label:"Jul 1754", type:"STORY", title:"Battle of Fort Necessity", description:"French and Native American forces surround Fort Necessity. Washington negotiates surrender.", sections:[
    { title:"A Desperate Defense", content:"Fort Necessity was little more than a circular palisade. Roughly 700 French soldiers and Native warriors descended on the fort." },
    { title:"The Surrender Document", content:"Washington agreed to negotiate. The surrender document contained an admission to the \"assassination\" of Jumonville." }
  ]},
  { id:6, year:1754, month:8, label:"Aug 1754", type:"STORY", title:"Washington Surrenders Fort", description:"Washington and his men march out with honors of war." },
  { id:7, year:1754, month:9, label:"Sep 1754", type:"QUOTE", title:"Albany Plan Rejected", quoteAuthor:"Benjamin Franklin", description:"The Albany Plan is rejected by every colonial legislature and by the British Crown." },
  { id:8, year:1754, month:10, label:"Oct 1754", type:"STORY", title:"Colonial Militias Mobilize", description:"Colonial governors begin raising militia forces across Virginia, Pennsylvania, and Maryland." },
  { id:9, year:1754, month:11, label:"Nov 1754", type:"STORY", title:"French Fortify Ohio Valley", description:"French forces strengthen Fort Duquesne and establish supply lines from Canada." },
  { id:10, year:1754, month:12, label:"Dec 1754", type:"STORY", title:"British Parliament Debates", description:"News of Washington\u2019s defeat sparks heated debate in Parliament." },
  { id:11, year:1755, month:4, label:"Apr 1755", type:"STORY", title:"Braddock Arrives in Virginia", description:"General Braddock arrives with two regiments of British regulars." },
  { id:12, year:1755, month:7, label:"Jul 1755", type:"STORY", title:"Braddock\u2019s Defeat", description:"Braddock\u2019s Defeat at the Monongahela. General Braddock was mortally wounded, and nearly two-thirds were casualties.", sections:[
    { title:"The March to Disaster", content:"Nearly 1,400 British regulars and 450 colonial militia set out, carving a road through dense forest." },
    { title:"Ambush at the Monongahela", content:"The British walked into an ambush. Of 1,469 men engaged, 977 were killed or wounded." },
    { title:"Washington's Survival", content:"Two horses were killed beneath Washington, four musket balls tore through his coat without touching him." }
  ]},
  { id:13, year:1756, month:5, label:"May 1756", type:"STORY", title:"Seven Years\u2019 War Declared", description:"Britain and France formally declare war, expanding the conflict globally." },
  { id:14, year:1757, month:8, label:"Aug 1757", type:"STORY", title:"Fort William Henry Falls", description:"The French under Montcalm capture Fort William Henry. The subsequent massacre shocks the colonial world." },
  { id:15, year:1758, month:7, label:"Jul 1758", type:"STORY", title:"Siege of Louisbourg", description:"A massive British amphibious assault captures the fortress of Louisbourg." },
  { id:16, year:1759, month:9, label:"Sep 1759", type:"STORY", title:"Battle of Quebec", description:"British General Wolfe scales the cliffs to the Plains of Abraham. Both commanders are killed.", sections:[
    { title:"The Impossible Climb", content:"Wolfe loaded 4,000 soldiers into boats and floated silently downriver. By dawn, they stood on the Plains of Abraham." },
    { title:"Fifteen Minutes That Changed a Continent", content:"Wolfe ordered his men to hold fire until the French were within 40 yards. The French line broke within fifteen minutes." },
    { title:"The Deaths of Two Generals", content:"Wolfe was hit three times and died on the field. Montcalm died the following morning. The city fell five days later." }
  ]},
  { id:17, year:1760, month:9, label:"Sep 1760", type:"STORY", title:"Montreal Surrenders", description:"The last major French stronghold surrenders, ending French colonial rule." },
].map(e => ({ ...e, image: placeholderImg(e.id, e.type === "QUOTE" ? 40 : 200) }));

const ALL_CATS = ["ALL","STORY","QUOTE","VIDEO","AUDIO CLIP"];
const SY=1754, EY=1761, BPX=200, SO=100, CG=36;
const ZL=[0.5,1.0,2.0,4.0];
const ML=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const BP=768;
const zt=z=>z<=0.5?1:z<=1?2:z<=2?3:4;
const CM={1:4,2:4,3:8,4:Infinity}, CP={1:180,2:200,3:220,4:0};
const gp=(y,m,px)=>SO+(y-SY+(m-1)/12)*px;
const cd=t=>t<=2?{w:185,h:56}:t===3?{w:215,h:74}:{w:250,h:280};

function useWinSize(){const[s,set]=useState({w:window.innerWidth,h:window.innerHeight});useEffect(()=>{const f=()=>set({w:window.innerWidth,h:window.innerHeight});window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);return s;}

function layoutEvts(evts,ppY,cW,cH,tier){
  const wp=evts.map(e=>({...e,pos:gp(e.year,e.month,ppY)}));
  if(tier===4){const r=[];let t=true;wp.forEach(e=>{r.push({...e,side:t?"top":"bottom",lane:0,leftPos:e.pos,clusterId:-1});t=!t;});return{cards:r,badges:[]};}
  const th=CP[tier],mx=CM[tier],cls=[];let c=[];
  wp.forEach(e=>{if(!c.length||(th>0&&e.pos-c[0].pos<th))c.push(e);else{cls.push(c);c=[e];}});if(c.length)cls.push(c);
  const r=[],bd=[];let tp=true;
  cls.forEach((cl,ci)=>{const vis=cl.slice(0,mx),hid=cl.length-vis.length,ln={top:[],bottom:[]};
    if(hid>0)bd.push({cid:ci,cx:(cl[0].pos+cl[cl.length-1].pos)/2,hc:hid,yr:cl[0].year});
    vis.forEach(ev=>{const l=ev.pos,ri=l+cW+10;const tryP=s=>{const sl=ln[s];for(let i=0;i<sl.length;i++)if(l>=sl[i]){sl[i]=ri;return{side:s,lane:i};}if(sl.length<3){sl.push(ri);return{side:s,lane:sl.length-1};}return null;};
      const p=tryP(tp?"top":"bottom")||tryP(tp?"bottom":"top")||(()=>{ln[tp?"top":"bottom"][0]=ri;return{side:tp?"top":"bottom",lane:0};})();
      r.push({...ev,...p,leftPos:l,clusterId:ci});tp=!tp;});});
  return{cards:r,badges:bd};
}

const Ico=({type,size=16})=>{
  const p={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"};
  const m={
    plus:<svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    minus:<svg {...p}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    home:<svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    chevL:<svg {...p}><polyline points="15 18 9 12 15 6"/></svg>,
    chevR:<svg {...p}><polyline points="9 18 15 12 9 6"/></svg>,
    x:<svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    filter:<svg {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
    share:<svg {...p}><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
    link:<svg {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
  };
  return m[type]||null;
};

// ─── Share Modal ─────────────────────────────────────────────────────
const ShareModal=({event,onClose})=>{
  const [copied,setCopied]=useState(false);
  if(!event)return null;
  const slug=event.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  const url=`${window.location.origin}${window.location.pathname}#event-${event.id}-${slug}`;
  const doCopy=()=>{navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{const el=document.createElement("textarea");el.value=url;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)"}}/>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",zIndex:1,background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:480,animation:"popIn 0.2s ease-out",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <h3 style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:"#1a1a1a",margin:0}}>Sharing link</h3>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",background:"#f0f0f0",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#666"}}><Ico type="x" size={14}/></button>
        </div>
        <div style={{fontSize:12,color:"#888",marginBottom:12}}>{event.title} \u2014 {event.label}</div>
        <div style={{display:"flex",gap:8}}>
          <input className="share-input" readOnly value={url} onClick={e=>e.target.select()}/>
          <button className="copy-btn" onClick={doCopy}>{copied?"Copied!":"Copy link"}</button>
        </div>
      </div>
    </div>
  );
};

// ─── Share Button (small) ────────────────────────────────────────────
const ShareBtn=({event,onShare,size=14,style:st={}})=>(
  <button onClick={e=>{e.stopPropagation();onShare(event);}} style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"rgba(255,255,255,0.6)",transition:"all 0.15s",flexShrink:0,...st}}
    onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.2)";e.currentTarget.style.color="#fff";}}
    onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.1)";e.currentTarget.style.color="rgba(255,255,255,0.6)";}}>
    <Ico type="link" size={size}/>
  </button>
);

// ─── Hover Preview Card (tier 4 style) ──────────────────────────────
const HoverPreview=({event,left,top,side})=>{
  const w=250,h=280;
  const py=side==="top"?top-h-20:top+20;
  return(
    <div style={{position:"absolute",left:left,top:py,width:w,zIndex:200,pointerEvents:"none",animation:"popIn 0.15s ease-out"}}>
      <div style={{background:"#3d4a6b",borderRadius:8,overflow:"hidden",height:h,display:"flex",flexDirection:"column",border:"2px solid rgba(255,255,255,0.2)",boxShadow:"0 16px 48px rgba(0,0,0,0.7),0 4px 12px rgba(0,0,0,0.4)"}}>
        <div style={{padding:"12px 14px 8px"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:"#94a1b2",textTransform:"uppercase"}}>{event.type}</div>
          <div style={{fontSize:14,fontWeight:700,color:"#fff",fontFamily:"Georgia,serif",lineHeight:1.3,marginTop:4}}>{event.title}</div>
          <div style={{fontSize:12,color:"#94a1b2",marginTop:4}}>{event.label}</div>
          {event.quoteAuthor&&<div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:4,textTransform:"uppercase",letterSpacing:"1px"}}>\u2014 {event.quoteAuthor}</div>}
        </div>
        {event.image&&<div style={{flex:1,overflow:"hidden"}}><img src={event.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.85}}/></div>}
      </div>
    </div>
  );
};

// ─── Mobile Card ─────────────────────────────────────────────────────
const MobCard=({ev,onClick,isExp,onShare})=>{
  const hasSec=ev.sections&&ev.sections.length>0;
  return(
    <div style={{display:"flex",gap:12,position:"relative"}}>
      <div className="mobile-spine"><div className="mobile-dot"/><div className="mobile-line"/></div>
      <div style={{flex:1,paddingBottom:20}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:"rgba(255,255,255,0.4)",textTransform:"uppercase",marginBottom:4}}>{ev.label}</div>
        <div className="mobile-card" onClick={onClick}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:12}}>
            <div style={{width:44,height:44,borderRadius:6,overflow:"hidden",flexShrink:0}}><img src={ev.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:"1.5px",color:ev.type==="QUOTE"?"#e8a87c":"#7eb3e0",textTransform:"uppercase"}}>{ev.type}</div>
              <div style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:"Georgia,serif",lineHeight:1.3}}>{ev.title}</div>
              {ev.quoteAuthor&&<div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>\u2014 {ev.quoteAuthor}</div>}
            </div>
            <ShareBtn event={ev} onShare={onShare} size={12} style={{width:24,height:24}}/>
          </div>
          {isExp&&(<div style={{padding:"0 12px 12px"}}><div style={{height:1,background:"rgba(255,255,255,0.08)",marginBottom:10}}/><p style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.7,margin:0}}>{ev.description}</p><button onClick={e=>{e.stopPropagation();onClick();}} style={{background:"none",border:"none",color:"#c53030",fontWeight:700,fontSize:12,letterSpacing:"1px",textTransform:"uppercase",padding:0,marginTop:10,cursor:"pointer"}}>{hasSec?"Read Full Story \u2192":"View Details \u2192"}</button></div>)}
          {!isExp&&<div style={{padding:"0 12px 8px"}}><div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Tap to expand</div></div>}
        </div>
      </div>
    </div>
  );
};

// ─── Bottom Sheet ────────────────────────────────────────────────────
const BSheet=({ev,onClose,onNext,onPrev,hasN,hasP,onShare})=>{
  const[more,setMore]=useState(false);const ref=useRef(null);const dyRef=useRef(null),dxRef=useRef(null);const[drag,setDrag]=useState(0);
  useEffect(()=>{setMore(false);setDrag(0);if(ref.current)ref.current.scrollTop=0;},[ev?.id]);
  const ts=e=>{dyRef.current=e.touches[0].clientY;dxRef.current=e.touches[0].clientX;};
  const tm=e=>{if(dyRef.current===null)return;const d=e.touches[0].clientY-dyRef.current;if(d>0&&ref.current?.scrollTop<=0)setDrag(d);};
  const te=e=>{if(drag>120){onClose();setDrag(0);dyRef.current=null;dxRef.current=null;return;}setDrag(0);if(dxRef.current!==null&&e.changedTouches[0]){const dx=e.changedTouches[0].clientX-dxRef.current;if(Math.abs(dx)>60){dx<0?onNext():onPrev();}}dyRef.current=null;dxRef.current=null;};
  if(!ev)return null;const secs=ev.sections||[];
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)"}}/>
      <div onTouchStart={ts} onTouchMove={tm} onTouchEnd={te} style={{position:"relative",zIndex:1,background:"#1a2240",borderRadius:"16px 16px 0 0",maxHeight:"88vh",display:"flex",flexDirection:"column",transform:`translateY(${drag}px)`,transition:drag===0?"transform 0.3s":"none",boxShadow:"0 -8px 40px rgba(0,0,0,0.6)"}}>

function App(){
  const{w:wW}=useWinSize();const mob=wW<BP;
  const sRef=useRef(null);
  const[zl,setZl]=useState(1);const[selId,setSelId]=useState(null);const[det,setDet]=useState(false);const[start,setStart]=useState(true);const[filt,setFilt]=useState("ALL");const[drag,setDrag]=useState(false);const[hId,setHId]=useState(null);const[sI,setSI]=useState({l:0,m:1});const[fOpen,setFOpen]=useState(false);const[expCard,setExpCard]=useState(null);const[shareEv,setShareEv]=useState(null);
  const dRef=useRef(null),wdRef=useRef(false);

  const tier=zt(zl),{w:cW,h:cH}=cd(tier);
  const ppY=tier===4?Math.max(BPX*zl,(cW+20)*12):BPX*zl;
  const tW=gp(EY,1,ppY)+400,cHt=800,AY=Math.round(cHt*0.52);

  const fil=useMemo(()=>filt==="ALL"?EVENTS:EVENTS.filter(e=>e.type===filt),[filt]);
  const lr=useMemo(()=>layoutEvts(fil,ppY,cW,cH,tier),[fil,ppY,cW,cH,tier]);
  const selEv=fil.find(e=>e.id===selId)||fil[0];
  const selIdx=fil.findIndex(e=>e.id===(selId||fil[0]?.id));

  const zi=()=>setZl(z=>{const i=ZL.findIndex(l=>l>=z);return ZL[Math.min(i+1,ZL.length-1)];});
  const zo=()=>setZl(z=>{const i=ZL.findIndex(l=>l>=z);return ZL[Math.max(i-1,0)];});
  const pL=useCallback(()=>sRef.current?.scrollBy({left:-400,behavior:"smooth"}),[]);
  const pR=useCallback(()=>sRef.current?.scrollBy({left:400,behavior:"smooth"}),[]);
  const nxt=useCallback(()=>{if(!fil.length)return;setSelId(fil[(selIdx+1)%fil.length].id);},[selIdx,fil]);
  const prv=useCallback(()=>{if(!fil.length)return;setSelId(fil[(selIdx-1+fil.length)%fil.length].id);},[selIdx,fil]);

  const expClust=useCallback(cid=>{
    const cc=lr.cards.filter(e=>e.clusterId===cid);const i=ZL.findIndex(z=>z>=zl);const nz=ZL[Math.min(i+1,ZL.length-1)];setZl(nz);
    if(cc.length&&sRef.current){const fe=cc[0],nt=zt(nz),np=nt===4?Math.max(BPX*nz,(cd(nt).w+20)*12):BPX*nz;const nc=gp(fe.year,fe.month,np);setTimeout(()=>sRef.current?.scrollTo({left:Math.max(0,nc-sRef.current.clientWidth/3),behavior:"smooth"}),50);}
  },[lr.cards,zl]);

  useEffect(()=>{if(mob)return;const h=e=>{if(start)return;if(det){if(e.key==="ArrowRight")nxt();else if(e.key==="ArrowLeft")prv();else if(e.key==="Escape")setDet(false);}else{if(e.key==="ArrowRight"){e.preventDefault();pR();}else if(e.key==="ArrowLeft"){e.preventDefault();pL();}}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[det,start,nxt,prv,pL,pR,mob]);
  useEffect(()=>{const u=()=>{setDrag(false);dRef.current=null;};window.addEventListener("mouseup",u);return()=>window.removeEventListener("mouseup",u);},[]);

  const md=e=>{if(mob||e.target.closest("button"))return;setDrag(true);dRef.current={x:e.clientX,sl:sRef.current?.scrollLeft||0};wdRef.current=false;};
  const mm=e=>{if(!drag||!dRef.current||!sRef.current)return;const dx=e.clientX-dRef.current.x;sRef.current.scrollLeft=dRef.current.sl-dx;wdRef.current=Math.abs(dx)>5;};
  const osc=()=>{if(!sRef.current)return;setSI({l:sRef.current.scrollLeft,m:sRef.current.scrollWidth-sRef.current.clientWidth});};

  const onShare=ev=>setShareEv(ev);

  const yg=useMemo(()=>{const g={};fil.forEach(e=>{if(!g[e.year])g[e.year]=[];g[e.year].push(e);});return Object.entries(g).sort(([a],[b])=>a-b);},[fil]);

  if(mob)return(
    <div style={{width:"100%",minHeight:"100vh",background:"#0d1117",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",position:"relative"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 20%,#2a1a0a 0%,#0d1117 70%)",opacity:0.4,pointerEvents:"none"}}/>
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(13,17,23,0.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:"#e8e0d4",margin:0}}>Timeline of the American Revolution</h1>
          <button onClick={()=>setFOpen(!fOpen)} style={{width:36,height:36,borderRadius:"50%",background:fOpen?"#c53030":"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:fOpen?"#fff":"rgba(255,255,255,0.6)",cursor:"pointer",position:"relative"}}>
            <Ico type="filter" size={14}/>{filt!=="ALL"&&<div style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:"#c53030",border:"2px solid #0d1117"}}/>}
          </button>
        </div>
        {fOpen&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.06)"}}>{ALL_CATS.map(c=><button key={c} className={`chip-mobile ${filt===c?"active":"inactive"}`} onClick={()=>{setFilt(c);setFOpen(false);setExpCard(null);}}>{c}</button>)}</div>}
      </div>
      <div style={{position:"relative",zIndex:1,padding:"0 16px 100px"}}>
        {yg.map(([yr,evts])=><div key={yr}><div style={{position:"sticky",top:60,zIndex:10,display:"flex",alignItems:"center",gap:10,padding:"16px 0 12px",background:"#0d1117"}}><div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:900,color:"#c53030"}}>{yr}</div><div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/><div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{evts.length} event{evts.length!==1?"s":""}</div></div>
          {evts.map(ev=><MobCard key={ev.id} ev={ev} isExp={expCard===ev.id} onShare={onShare} onClick={()=>{if(expCard!==ev.id)setExpCard(ev.id);else{setSelId(ev.id);setDet(true);}}}/>)}</div>)}
      </div>
      <Start vis={start} onGo={()=>setStart(false)} mob={true}/>
      {det&&selEv&&<BSheet ev={selEv} onClose={()=>setDet(false)} onNext={nxt} onPrev={prv} hasN={selIdx<fil.length-1} hasP={selIdx>0} onShare={onShare}/>}
      {shareEv&&<ShareModal event={shareEv} onClose={()=>setShareEv(null)}/>}
    </div>
  );

  const cL=sI.l>10,cR=sI.l<sI.m-10;
  return(
    <div style={{width:"100%",height:"100vh",background:"#0d1117",position:"relative",overflow:"hidden",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 70% 40%,#2a1a0a 0%,#0d1117 70%)",opacity:0.5}}/>
      <div style={{position:"absolute",inset:0,background:"rgba(10,14,35,0.5)",zIndex:0}}/>
      <div style={{position:"absolute",top:0,left:0,right:0,zIndex:40,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"linear-gradient(to bottom,rgba(13,17,23,0.85) 0%,rgba(13,17,23,0.4) 70%,transparent 100%)",pointerEvents:"none"}}>
        <h1 style={{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:"#e8e0d4",letterSpacing:"0.3px",margin:0,whiteSpace:"nowrap",pointerEvents:"auto"}}>Timeline of the American Revolution</h1>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",pointerEvents:"auto"}}><Ico type="filter" size={14}/>{ALL_CATS.map(c=><button key={c} className={`chip ${filt===c?"active":"inactive"}`} onClick={()=>{setFilt(c);setDet(false);setSelId(null);}}>{c}</button>)}</div>
      </div>
      <div ref={sRef} onMouseDown={md} onMouseMove={mm} onMouseUp={()=>{setDrag(false);dRef.current=null;}} onMouseLeave={()=>{setDrag(false);dRef.current=null;}} onScroll={osc}
        style={{position:"absolute",inset:0,zIndex:20,overflowX:"auto",overflowY:"hidden",cursor:drag?"grabbing":"grab",userSelect:"none",scrollbarWidth:"thin"}}>
        <div style={{position:"relative",width:tW,height:cHt}}>
          <Axis ppY={ppY} aY={AY}/>
          {lr.cards.map((ev,i)=><TCard key={`${ev.id}-${tier}`} ev={ev} idx={i} lp={ev.leftPos} side={ev.side} lane={ev.lane} aY={AY} isSel={!start&&ev.id===selId} onClick={()=>{if(!wdRef.current){setSelId(ev.id);setDet(true);setStart(false);}}} cW={cW} cH={cH} tier={tier} hId={hId} setH={setHId} onShare={onShare}/>)}
          {lr.badges.map(b=>{const cc=lr.cards.filter(e=>e.clusterId===b.cid);let ml=0;cc.forEach(c=>{if(c.side==="bottom")ml=Math.max(ml,c.lane);});const bt=AY+CG+ml*(cH+12)+cH+16;let bx=b.cx;for(let y=SY;y<=EY;y++){if(Math.abs(bx-gp(y,1,ppY))<40){bx=gp(y,1,ppY)+50;break;}}
            return(<div key={`b-${b.cid}`} onClick={e=>{e.stopPropagation();expClust(b.cid);}} style={{position:"absolute",left:bx,top:bt,transform:"translateX(-50%)",zIndex:25,cursor:"pointer"}}><div style={{background:"linear-gradient(135deg,#c53030,#9b2c2c)",color:"#fff",fontSize:10,fontWeight:700,padding:"5px 14px",borderRadius:14,whiteSpace:"nowrap",boxShadow:"0 2px 10px rgba(192,57,43,0.4)",display:"flex",alignItems:"center",gap:6,transition:"transform 0.2s"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>+{b.hc} more <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>);})}
        </div>
      </div>
      {!det&&cL&&<button className="edge-arrow left" onClick={pL}><Ico type="chevL" size={22}/></button>}
      {!det&&cR&&<button className="edge-arrow right" onClick={pR}><Ico type="chevR" size={22}/></button>}
      <div style={{position:"absolute",left:0,bottom:0,right:0,zIndex:40,display:"flex",alignItems:"center",justifyContent:"center",gap:12,background:"rgba(10,14,35,0.85)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.1)",padding:"8px 16px"}}>
        <button className="zbtn" onClick={zo}><Ico type="minus" size={12}/></button>
        <div style={{fontSize:10,color:"#fff",fontWeight:500,padding:"4px 10px",background:"rgba(0,0,0,0.4)",borderRadius:4,border:"1px solid rgba(255,255,255,0.2)",textAlign:"center",minWidth:42}}>{Math.round(zl*100)}%</div>
        <button className="zbtn" onClick={zi}><Ico type="plus" size={12}/></button>
        <div style={{width:1,height:20,background:"rgba(255,255,255,0.15)",margin:"0 4px"}}/>
        <button className="zbtn" onClick={()=>{setStart(true);setDet(false);setSelId(null);}}><Ico type="home" size={12}/></button>
      </div>
      <Start vis={start} onGo={()=>setStart(false)} mob={false}/>
      {det&&!start&&<Detail ev={selEv} onNext={nxt} onPrev={prv} onClose={()=>setDet(false)} onShare={onShare}/>}
      {shareEv&&<ShareModal event={shareEv} onClose={()=>setShareEv(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("app"));
</script>
</body>
</html>
